name: chatbot_app
description: "Galala University Student Portal - Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  bloc: ^8.1.3
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Dependency Injection
  get_it: 7.6.8

  # Functional Programming / Error Handling
  dartz: ^0.10.1

  # Networking (ready for real backend)
  dio: ^5.4.3+1

  # Fonts & Icons
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1

  # UI Extras
  flutter_screenutil: ^5.9.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/


